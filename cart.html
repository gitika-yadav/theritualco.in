<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Cart – The Ritual Co.</title>
    <link rel="stylesheet" href="/css/global.css"/>
    <link rel="stylesheet" href="/css/navbar.css"/>
    <link rel="stylesheet" href="/css/footer.css"/>
    <link rel="stylesheet" href="/css/cart.css"/>
    <link rel="icon" type="image/webp" href="/images/favicon.webp"/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
    <!-- Meta Pixel Code -->
    <script>
        !function(f,b,e,v,n,t,s)
        {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
            n.callMethod.apply(n,arguments):n.queue.push(arguments)};
            if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
            n.queue=[];t=b.createElement(e);t.async=!0;
            t.src=v;s=b.getElementsByTagName(e)[0];
            s.parentNode.insertBefore(t,s)}(window, document,'script',
            'https://connect.facebook.net/en_US/fbevents.js');
        fbq('init', '1372190218138137');
        fbq('track', 'PageView');
    </script>
    <noscript><img height="1" width="1" style="display:none"
                   src="https://www.facebook.com/tr?id=1372190218138137&ev=PageView&noscript=1"
    /></noscript>
    <!-- End Meta Pixel Code -->
</head>
<body>
<div id="navbar-placeholder"></div>

<div id="cart-page-wrap">
    <div id="cart-has-items" style="display:none">
        <div class="cart-wrap">
            <!-- Left: items -->
            <div>
                <p class="cart-label">The Ritual Co.</p>
                <h1 class="cart-title">Your Cart</h1>
                <div id="cart-page-items"></div>
            </div>

            <!-- Right: summary -->
            <aside class="cart-summary">
                <p class="cart-summary-title">Order Summary</p>
                <div class="cart-summary-row">
                    <span>Subtotal</span>
                    <span id="cart-subtotal"></span>
                </div>
                <div class="cart-summary-row">
                    <span>Shipping</span>
                    <span>Free</span>
                </div>
                <div class="cart-summary-row total">
                    <span>Total</span>
                    <span id="cart-total"></span>
                </div>
                <a href="/checkout.html" class="cart-checkout-btn">Proceed to Checkout</a>
                <a href="/products/products" class="cart-continue">Continue shopping</a>
            </aside>
        </div>
    </div>

    <div id="cart-is-empty" style="display:none">
        <div class="cart-wrap">
            <div class="cart-empty">
                <p>Your cart is empty.</p>
                <a href="/products/products">Start shopping</a>
            </div>
        </div>
    </div>
</div>

<div id="footer-placeholder"></div>

<script src="/javascript/cart.js"></script>
<script>
    function renderCartPage() {
        const cart = Cart.get();
        const hasItems = document.getElementById("cart-has-items");
        const isEmpty  = document.getElementById("cart-is-empty");
        const itemsEl  = document.getElementById("cart-page-items");
        const subtotal = document.getElementById("cart-subtotal");
        const total    = document.getElementById("cart-total");

        if (cart.items.length === 0) {
            hasItems.style.display = "none";
            isEmpty.style.display  = "block";
            return;
        }

        hasItems.style.display = "block";
        isEmpty.style.display  = "none";

        fbq('track', 'AddToCart', {
            content_ids: ['capsule-dumbbell'],
            content_type: 'product',
            value: Cart.total(),
            currency: 'INR'
        });

        itemsEl.innerHTML = cart.items.map(item => `
      <div class="cart-item" data-key="${item.key}">
        ${item.image
            ? `<img src="${item.image}" alt="${item.name}" class="cart-item-img" loading="lazy"/>`
            : `<div class="cart-item-img"></div>`}
        <div class="cart-item-info">
          <p class="cart-item-name">${item.name}</p>
          <p class="cart-item-meta">${item.weight} · ${item.color}</p>
          <p class="cart-item-price">₹${(item.price * item.qty).toLocaleString("en-IN")}</p>
        </div>
        <div class="cart-item-qty">
          <button onclick="changeQty('${item.key}', ${item.qty - 1})">−</button>
          <span>${item.qty}</span>
          <button onclick="changeQty('${item.key}', ${item.qty + 1})">+</button>
        </div>
        <button class="cart-item-remove" onclick="removeItem('${item.key}')" title="Remove">×</button>
      </div>
    `).join("");

        const t = Cart.total();
        subtotal.textContent = "₹" + t.toLocaleString("en-IN");
        total.textContent    = "₹" + t.toLocaleString("en-IN");
    }

    function changeQty(key, qty) {
        Cart.updateQty(key, qty);
        renderCartPage();
    }

    function removeItem(key) {
        Cart.remove(key);
        renderCartPage();
    }

    window.addEventListener("cart:updated", renderCartPage);
    renderCartPage();
</script>
<script>
    fetch("/partials/navbar.html").then(r=>r.text()).then(html=>{
        document.getElementById("navbar-placeholder").innerHTML = html;
        const s = document.createElement("script"); s.src="/javascript/cart-drawer.js"; document.body.appendChild(s);
        const s2 = document.createElement("script"); s2.src="/javascript/navbar.js"; document.body.appendChild(s2);
    });
    fetch("/partials/footer.html").then(r=>r.text()).then(html=>{
        document.getElementById("footer-placeholder").innerHTML = html;
    });
</script>
</body>
</html>
