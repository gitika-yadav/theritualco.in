<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Login – The Ritual Co.</title>
    <link rel="stylesheet" href="/css/global.css"/>
    <link rel="stylesheet" href="/css/navbar.css"/>
    <link rel="stylesheet" href="/css/footer.css"/>
    <link rel="icon" type="image/png" href="/images/favicon.png"/>
    <style>
        body { background: #faf8f6; }
        .auth-wrap {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 16px;
        }
        .auth-card {
            background: #fff;
            border: 1px solid #e8e2dc;
            border-radius: 16px;
            padding: 40px 36px;
            width: 100%;
            max-width: 400px;
        }
        .auth-label {
            font-size: 10px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #a09890;
            margin: 0 0 8px;
            display: block;
        }
        .auth-title {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 28px;
            font-weight: 400;
            color: #3a3330;
            margin: 0 0 28px;
        }
        .auth-field { margin-bottom: 16px; }
        .auth-field label {
            display: block;
            font-size: 11px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #7a6f68;
            margin-bottom: 6px;
        }
        .auth-field input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e8e2dc;
            border-radius: 8px;
            font-size: 14px;
            color: #3a3330;
            background: #faf8f6;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }
        .auth-field input:focus { border-color: #c0a898; }
        .auth-btn {
            width: 100%;
            padding: 12px;
            background: #3a3330;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }
        .auth-btn:hover { background: #5a4f48; }
        .auth-btn:disabled { background: #c0b8b0; cursor: not-allowed; }
        .auth-divider {
            text-align: center;
            margin: 20px 0;
            font-size: 12px;
            color: #c0b8b0;
            position: relative;
        }
        .auth-divider::before, .auth-divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 42%;
            height: 1px;
            background: #e8e2dc;
        }
        .auth-divider::before { left: 0; }
        .auth-divider::after  { right: 0; }
        .auth-switch {
            text-align: center;
            font-size: 13px;
            color: #7a6f68;
            margin-top: 20px;
        }
        .auth-switch a { color: #3a3330; text-decoration: underline; text-underline-offset: 2px; }
        .auth-error {
            background: #fdf0ee;
            border: 1px solid #f0c8c0;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            color: #8b3a2a;
            margin-bottom: 16px;
            display: none;
        }
        .auth-success {
            background: #f0f7ee;
            border: 1px solid #c0dab8;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            color: #2a6b3a;
            margin-bottom: 16px;
            display: none;
        }
        /* Tab toggle */
        .auth-tabs {
            display: flex;
            gap: 0;
            border: 1px solid #e8e2dc;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 28px;
        }
        .auth-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            background: #faf8f6;
            color: #a09890;
            border: none;
            transition: background 0.2s, color 0.2s;
        }
        .auth-tab.active {
            background: #3a3330;
            color: #fff;
        }
        .auth-form { display: none; }
        .auth-form.active { display: block; }
        .forgot-link {
            font-size: 12px;
            color: #a09890;
            text-decoration: underline;
            text-underline-offset: 2px;
            cursor: pointer;
            display: block;
            text-align: right;
            margin-top: -8px;
            margin-bottom: 16px;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400&display=swap" rel="stylesheet"/>
</head>
<body>
<div id="navbar-placeholder"></div>

<div class="auth-wrap">
    <div class="auth-card">
        <span class="auth-label">The Ritual Co.</span>
        <h1 class="auth-title">Your account</h1>

        <div class="auth-tabs">
            <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign in</button>
            <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Create account</button>
        </div>

        <div id="msg-error" class="auth-error"></div>
        <div id="msg-success" class="auth-success"></div>

        <!-- LOGIN FORM -->
        <div class="auth-form active" id="form-login">
            <div class="auth-field">
                <label for="login-email">Email</label>
                <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email"/>
            </div>
            <div class="auth-field">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"/>
            </div>
            <span class="forgot-link" onclick="showForgot()">Forgot password?</span>
            <button class="auth-btn" id="btn-login" onclick="handleLogin()">Sign in</button>
        </div>

        <!-- SIGNUP FORM -->
        <div class="auth-form" id="form-signup">
            <div class="auth-field">
                <label for="signup-name">Full name</label>
                <input type="text" id="signup-name" placeholder="Gitika Yadav" autocomplete="name"/>
            </div>
            <div class="auth-field">
                <label for="signup-email">Email</label>
                <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email"/>
            </div>
            <div class="auth-field">
                <label for="signup-password">Password</label>
                <input type="password" id="signup-password" placeholder="Min. 8 characters" autocomplete="new-password"/>
            </div>
            <button class="auth-btn" id="btn-signup" onclick="handleSignup()">Create account</button>
        </div>

        <!-- FORGOT PASSWORD FORM -->
        <div class="auth-form" id="form-forgot">
            <p style="font-size:13px;color:#7a6f68;margin:0 0 16px;">Enter your email and we'll send a reset link.</p>
            <div class="auth-field">
                <label for="forgot-email">Email</label>
                <input type="email" id="forgot-email" placeholder="you@example.com"/>
            </div>
            <button class="auth-btn" id="btn-forgot" onclick="handleForgot()">Send reset link</button>
            <span class="forgot-link" style="text-align:left;margin-top:12px;" onclick="switchTab('login')">← Back to sign in</span>
        </div>

    </div>
</div>

<div id="footer-placeholder"></div>

<script type="module">
    import { supabase, getUser } from "/javascript/auth.js";

    // Redirect if already logged in
    const user = await getUser();
    if (user) window.location.href = "/account/orders.html";

    // Check for redirect after email confirm
    const hash = window.location.hash;
    if (hash.includes("type=recovery")) {
        window.location.href = "/account/reset-password.html" + hash;
    }

    window.switchTab = (tab) => {
        document.querySelectorAll(".auth-tab").forEach(t => t.classList.remove("active"));
        document.querySelectorAll(".auth-form").forEach(f => f.classList.remove("active"));
        document.getElementById("tab-" + tab).classList.add("active");
        document.getElementById("form-" + tab).classList.add("active");
        clearMessages();
    };

    window.showForgot = () => {
        document.querySelectorAll(".auth-tab").forEach(t => t.classList.remove("active"));
        document.querySelectorAll(".auth-form").forEach(f => f.classList.remove("active"));
        document.getElementById("form-forgot").classList.add("active");
        clearMessages();
    };

    function showError(msg) {
        const el = document.getElementById("msg-error");
        el.textContent = msg;
        el.style.display = "block";
        document.getElementById("msg-success").style.display = "none";
    }

    function showSuccess(msg) {
        const el = document.getElementById("msg-success");
        el.textContent = msg;
        el.style.display = "block";
        document.getElementById("msg-error").style.display = "none";
    }

    function clearMessages() {
        document.getElementById("msg-error").style.display = "none";
        document.getElementById("msg-success").style.display = "none";
    }

    window.handleLogin = async () => {
        const email    = document.getElementById("login-email").value.trim();
        const password = document.getElementById("login-password").value;
        const btn      = document.getElementById("btn-login");
        if (!email || !password) return showError("Please enter your email and password.");
        btn.disabled = true; btn.textContent = "Signing in…";
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) {
            showError(error.message === "Invalid login credentials"
                ? "Incorrect email or password."
                : error.message);
            btn.disabled = false; btn.textContent = "Sign in";
        } else {
            // Redirect to orders or wherever they came from
            const next = new URLSearchParams(window.location.search).get("next") || "/account/orders.html";
            window.location.href = next;
        }
    };

    window.handleSignup = async () => {
        const name     = document.getElementById("signup-name").value.trim();
        const email    = document.getElementById("signup-email").value.trim();
        const password = document.getElementById("signup-password").value;
        const btn      = document.getElementById("btn-signup");
        if (!name || !email || !password) return showError("Please fill in all fields.");
        if (password.length < 8) return showError("Password must be at least 8 characters.");
        btn.disabled = true; btn.textContent = "Creating account…";
        const { error } = await supabase.auth.signUp({
            email, password,
            options: { data: { full_name: name } }
        });
        if (error) {
            showError(error.message);
            btn.disabled = false; btn.textContent = "Create account";
        } else {
            showSuccess("Account created! Check your email to verify, then sign in.");
            btn.disabled = false; btn.textContent = "Create account";
            switchTab("login");
        }
    };

    window.handleForgot = async () => {
        const email = document.getElementById("forgot-email").value.trim();
        const btn   = document.getElementById("btn-forgot");
        if (!email) return showError("Please enter your email.");
        btn.disabled = true; btn.textContent = "Sending…";
        const { error } = await supabase.auth.resetPasswordForEmail(email, {
            redirectTo: "https://theritualco.in/account/reset-password.html"
        });
        if (error) {
            showError(error.message);
        } else {
            showSuccess("Reset link sent! Check your inbox.");
        }
        btn.disabled = false; btn.textContent = "Send reset link";
    };

    // Allow Enter key on inputs
    document.addEventListener("keydown", (e) => {
        if (e.key !== "Enter") return;
        const active = document.querySelector(".auth-form.active").id;
        if (active === "form-login")  window.handleLogin();
        if (active === "form-signup") window.handleSignup();
        if (active === "form-forgot") window.handleForgot();
    });
</script>

<script>
    fetch("/partials/navbar.html").then(r=>r.text()).then(html=>{
        document.getElementById("navbar-placeholder").innerHTML = html;
        const s = document.createElement("script"); s.src="/js/navbar.js"; document.body.appendChild(s);
    });
    fetch("/partials/footer.html").then(r=>r.text()).then(html=>{
        document.getElementById("footer-placeholder").innerHTML = html;
    });
</script>
</body>
</html>
