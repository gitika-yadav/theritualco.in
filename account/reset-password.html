<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <meta name="robots" content="noindex, nofollow">
    <title>Reset Password – The Ritual Co.</title>
    <link rel="stylesheet" href="/css/global.css"/>
    <link rel="stylesheet" href="/css/navbar.css"/>
    <link rel="stylesheet" href="/css/footer.css"/>
    <link rel="icon" type="image/png" href="/images/favicon.png"/>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400&display=swap" rel="stylesheet"/>
    <style>
        body{background:#faf8f6}
        .auth-wrap{min-height:80vh;display:flex;align-items:center;justify-content:center;padding:40px 16px}
        .auth-card{background:#fff;border:1px solid #e8e2dc;border-radius:16px;padding:40px 36px;width:100%;max-width:400px}
        .auth-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#a09890;margin:0 0 8px;display:block}
        .auth-title{font-family:'Cormorant Garamond',Georgia,serif;font-size:28px;font-weight:400;color:#3a3330;margin:0 0 28px}
        .auth-field{margin-bottom:16px}
        .auth-field label{display:block;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#7a6f68;margin-bottom:6px}
        .auth-field input{width:100%;padding:10px 14px;border:1px solid #e8e2dc;border-radius:8px;font-size:14px;color:#3a3330;background:#faf8f6;box-sizing:border-box;outline:none}
        .auth-field input:focus{border-color:#c0a898}
        .auth-btn{width:100%;padding:12px;background:#3a3330;color:#fff;border:none;border-radius:8px;font-size:13px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;margin-top:8px}
        .auth-btn:disabled{background:#c0b8b0;cursor:not-allowed}
        .auth-error{background:#fdf0ee;border:1px solid #f0c8c0;border-radius:8px;padding:10px 14px;font-size:13px;color:#8b3a2a;margin-bottom:16px;display:none}
        .auth-success{background:#f0f7ee;border:1px solid #c0dab8;border-radius:8px;padding:10px 14px;font-size:13px;color:#2a6b3a;margin-bottom:16px;display:none}
    </style>
</head>
<body>
<div id="navbar-placeholder"></div>
<div class="auth-wrap">
    <div class="auth-card">
        <span class="auth-label">The Ritual Co.</span>
        <h1 class="auth-title">Set new password</h1>
        <div id="msg-error" class="auth-error"></div>
        <div id="msg-success" class="auth-success"></div>
        <div class="auth-field">
            <label for="new-password">New password</label>
            <input type="password" id="new-password" placeholder="Min. 8 characters"/>
        </div>
        <div class="auth-field">
            <label for="confirm-password">Confirm password</label>
            <input type="password" id="confirm-password" placeholder="Repeat password"/>
        </div>
        <button class="auth-btn" id="btn-reset" onclick="handleReset()">Update password</button>
    </div>
</div>
<div id="footer-placeholder"></div>
<script type="module">
    import { supabase } from "/javascript/auth.js";

    window.handleReset = async () => {
        const p1  = document.getElementById("new-password").value;
        const p2  = document.getElementById("confirm-password").value;
        const btn = document.getElementById("btn-reset");
        const err = document.getElementById("msg-error");
        const ok  = document.getElementById("msg-success");
        if (p1.length < 8) { err.textContent="Min. 8 characters."; err.style.display="block"; return; }
        if (p1 !== p2)     { err.textContent="Passwords don't match."; err.style.display="block"; return; }
        btn.disabled=true; btn.textContent="Updating…";
        const { error } = await supabase.auth.updateUser({ password: p1 });
        if (error) {
            err.textContent=error.message; err.style.display="block";
            btn.disabled=false; btn.textContent="Update password";
        } else {
            ok.textContent="Password updated! Redirecting…"; ok.style.display="block";
            setTimeout(()=>window.location.href="/account/orders.html", 2000);
        }
    };
</script>
<script>
    fetch("/partials/navbar.html").then(r=>r.text()).then(html=>{
        document.getElementById("navbar-placeholder").innerHTML=html;
        const s=document.createElement("script");s.src="/javascript/navbar.js";document.body.appendChild(s);
    });
    fetch("/partials/footer.html").then(r=>r.text()).then(html=>{document.getElementById("footer-placeholder").innerHTML=html;});
</script>
</body>
</html>
