<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-D366Q7R3XB"></script>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Checkout • The Ritual Co</title>

    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/navbar.css">
    <link rel="stylesheet" href="/css/footer.css">
    <link rel="stylesheet" href="/css/checkout.css">
    <link rel="icon" type="image/png" href="/images/favicon.png" />

</head>

<body>

<div id="navbar-placeholder"></div>

<main class="checkout">

    <section class="checkout-left">

        <p>EARLY BIRD ACCESS</p>

        <h1>
            Pre-Order Capsule Dumbbells
        </h1>

        <p class="checkout-copy">
            Designed intentionally.
            Balanced beautifully.
            Limited first production run.
        </p>

        <div class="form-grid">

            <input id="name" placeholder="Full Name" required>

            <input id="email" placeholder="Email" required>

            <input id="phone" placeholder="Phone Number" required>

            <input id="address" placeholder="Shipping Address" required>

            <select id="product" required>

                <option value="1499">
                    1 KG Set • ₹1,999 → ₹1,499
                </option>

                <option value="1999">
                    2 KG Set • ₹2,499 → ₹1,999
                </option>

            </select>

            <label for="color">

                Color

            </label>

            <select
                    id="color"
                    required>

                <option value="Black">Black </option>

                <option value="Cream"> Cream</option>

                <option value="Cream"> Peach</option>

                <option value="Grey"> Cream</option>

            </select>

        </div>

    </section>

    <aside class="checkout-right">

        <h2 class="order-title">
            Order Summary
        </h2>

        <div class="line">

<span>
Capsule Dumbbells
</span>

            <span id="price">
₹1,999
</span>

        </div>

        <div class="line">

<span>
Shipping
</span>

            <span>
Free
</span>

        </div>

        <div class="line total">

<span>
Total
</span>

            <span id="total">
₹1,999
</span>

        </div>

        <button class="pay"
                id="payBtn">
            Continue To Payment
        </button>

        <p class="ship">
            Early Bird pricing.
            Ships June 2026.
        </p>

    </aside>

</main>

<div id="footer-placeholder"></div>

<script>

    const product=
        document.getElementById(
            "product"
        );

    const total=
        document.getElementById(
            "total"
        );

    const price=
        document.getElementById(
            "price"
        );

    product.addEventListener(
        "change",
        ()=>{

            const value=
                "₹"+
                product.value;

            price.innerText=
                value;

            total.innerText=
                value;

        }
    );

</script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>

    document
        .getElementById(
            "payBtn"
        )

        .onclick=async()=>{

        const name=
            document
                .getElementById(
                    "name"
                )
                .value
                .trim();

        const email=
            document
                .getElementById(
                    "email"
                )
                .value
                .trim();

        const phone=
            document
                .getElementById(
                    "phone"
                )
                .value
                .trim();

        const address=
            document
                .getElementById(
                    "address"
                )
                .value
                .trim();

        const color=
            document
                .getElementById(
                    "color"
                )
                .value.trim()

        const product=
            document
                .getElementById(
                    "product"
                );

        if(
            !name||
            !email||
            !phone||
            !address
        ){

            alert(
                "Please complete all details."
            );

            return;

        }

        const emailRegex=

            /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        if(
            !emailRegex.test(
                email
            )
        ){

            alert(
                "Please enter valid email."
            );

            return;

        }

        if(
            phone.length<10
        ){

            alert(
                "Please enter valid phone number."
            );

            return;

        }

        const amount=
            product.value;

        const orderRes=

            await fetch(

                "/.netlify/functions/create-order",

                {

                    method:"POST",

                    headers:{

                        "Content-Type":
                            "application/json"

                    },

                    body:

                        JSON.stringify({

                            amount

                        })

                }

            );

        const order=

            await orderRes.json();

        const razorpay=

            new Razorpay({

                key: "rzp_live_StfKLLzsHxMey6",

                amount: order.amount,

                currency: "INR",

                order_id: order.order_id,

                name: "The Ritual Co",

                description: "Capsule Dumbbell Preorder",

                theme:{

                    color:"#49201F"

                },

                handler:
                    async function(response){

                        gtag('event', 'purchase', {
                            transaction_id: response.razorpay_payment_id,
                            value: 1999,
                            currency: 'INR'
                        });

                        const verify= await fetch("/.netlify/functions/verify-payment",
                            {     method:"POST",
                                  headers:{
                                        "Content-Type":
                                            "application/json"
                                    },
                                    body:
                                        JSON.stringify({
                                            razorpay_order_id: response.razorpay_order_id,
                                            razorpay_payment_id: response.razorpay_payment_id,
                                            razorpay_signature: response.razorpay_signature
                                        })
                                }

                            );

                        const verified= await verify.json();
                        if(
                            !verified.success
                        ){
                            alert(
                                "Payment verification failed"
                            );
                            return;
                        }

                        await fetch(
                            "https://script.google.com/macros/s/AKfycbx0MAr86D_9PcUEm6hLmhYHExZK4JdFxZB-VuixvPNAJ1xDE7PqvRxu6F1ncpqViNSN/exec",
                            {
                                method:"POST",
                                body:
                                    JSON.stringify({
                                        name,
                                        email,
                                        phone,
                                        address,
                                        color,
                                        product: "Capsule Dumbbells",
                                        weight: amount==="1999" ? "2 KG" : "1 KG",
                                        amount,
                                        paymentId: response.razorpay_payment_id,
                                        orderId: response.razorpay_order_id
                                    })
                            }
                        );
                        window.location=
                            "/thank-you.html";
                    }
            });
        razorpay.open();

    };

</script>
<script src="/javascript/checkout.js"></script>
<script>
    gtag('event', 'begin_checkout', {
        currency: 'INR',
        value: 1999
    });
</script>
</body>

</html>
