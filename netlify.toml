[build]
 publish = "."
 functions = "netlify/functions"
 ignore_secrets = ["SUPABASE_ANON_KEY"]

[dev]
 command = ""
 targetPort = 8888
 framework = "#static"
 autoLaunch = true
 edge_functions = false

[build.environment]
 NODE_VERSION = "18"

# ── Set these in Netlify Dashboard → Site → Environment Variables ──
# RAZORPAY_KEY_ID        = rzp_live_StfKLLzsHxMey6
# RAZORPAY_KEY_SECRET    = (your secret)
# SUPABASE_URL           = https://zewoxdagbywjubofwvde.supabase.co
# SUPABASE_ANON_KEY      = (your anon key)
# SUPABASE_SERVICE_KEY   = (your service role key — never expose to frontend)
# RESEND_API_KEY         = (from resend.com — free tier)
# GOOGLE_SHEET_URL       = (your existing Apps Script URL)

[[redirects]]
 from = "/account"
 to   = "/account/orders"
 status = 301

[[redirects]]
 from = "/*.html"
 to   = "/:splat"
 status = 301